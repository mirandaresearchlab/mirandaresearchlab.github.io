# site properties and page defaults
title: Miranda Lab
subtitle: Machine Learning & Image-based profiling
description: We develop machine learning methods to understand cellular behavior and interactions across imaging and omics data. Our research focuses on integrating diverse biological modalities to model, simulate, and predict complex biological processes, with applications in disease diagnosis and treatment.
header: images/background_3.png
footer: images/background_3.png
proofer: false

